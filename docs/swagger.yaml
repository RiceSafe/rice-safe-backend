basePath: /api
definitions:
  fiber.Map:
    additionalProperties: true
    type: object
  github_com_RiceSafe_rice-safe-backend_internal_disease.Disease:
    properties:
      alias:
        type: string
      category:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      image_url:
        type: string
      match_weather:
        items:
          type: string
        type: array
      name:
        type: string
      prevention:
        items:
          $ref: '#/definitions/github_com_RiceSafe_rice-safe-backend_internal_disease.InfoSection'
        type: array
      spread_details:
        type: string
      symptoms:
        items:
          $ref: '#/definitions/github_com_RiceSafe_rice-safe-backend_internal_disease.InfoSection'
        type: array
      treatment:
        items:
          $ref: '#/definitions/github_com_RiceSafe_rice-safe-backend_internal_disease.InfoSection'
        type: array
      updated_at:
        type: string
    type: object
  github_com_RiceSafe_rice-safe-backend_internal_disease.InfoSection:
    properties:
      description:
        type: string
      title:
        type: string
    type: object
  internal_auth.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/internal_auth.User'
    type: object
  internal_auth.ChangePasswordRequest:
    properties:
      new_password:
        minLength: 6
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  internal_auth.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  internal_auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  internal_auth.OAuthRequest:
    properties:
      id_token:
        type: string
      provider:
        enum:
        - google
        - line
        type: string
    required:
    - id_token
    - provider
    type: object
  internal_auth.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
      role:
        enum:
        - FARMER
        - EXPERT
        - ADMIN
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  internal_auth.ResetPasswordRequest:
    properties:
      new_password:
        minLength: 6
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  internal_auth.UpdateRoleRequest:
    properties:
      role:
        enum:
        - FARMER
        - EXPERT
        - ADMIN
        type: string
    required:
    - role
    type: object
  internal_auth.User:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        description: 'Nullable: OAuth users may not have email'
        type: string
      id:
        type: string
      role:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  internal_auth.UserListItem:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      role:
        type: string
      username:
        type: string
    type: object
  internal_community.Comment:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      post_id:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  internal_community.CreateCommentRequest:
    properties:
      content:
        type: string
    required:
    - content
    type: object
  internal_community.Post:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      image_url:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  internal_community.PostResponse:
    properties:
      author_avatar:
        type: string
      author_name:
        type: string
      comment_count:
        type: integer
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      image_url:
        type: string
      is_liked:
        type: boolean
      like_count:
        type: integer
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  internal_dashboard.WeatherResponse:
    properties:
      condition:
        type: string
      description:
        type: string
      humidity:
        type: integer
      icon_url:
        type: string
      location_name:
        type: string
      temperature:
        type: number
    type: object
  internal_diagnosis.DiagnosisResponse:
    properties:
      confidence:
        type: number
      created_at:
        type: string
      diagnosis_id:
        type: string
      disease_result:
        $ref: '#/definitions/github_com_RiceSafe_rice-safe-backend_internal_disease.Disease'
      image_url:
        type: string
      info_message:
        type: string
      prediction:
        type: string
    type: object
  internal_diagnosis.HistoryResponse:
    properties:
      confidence:
        type: number
      created_at:
        type: string
      disease_name:
        type: string
      id:
        type: string
      image_url:
        type: string
      prediction:
        type: string
    type: object
  internal_disease.Disease:
    properties:
      alias:
        type: string
      category:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      image_url:
        type: string
      match_weather:
        items:
          type: string
        type: array
      name:
        type: string
      prevention:
        items:
          $ref: '#/definitions/internal_disease.InfoSection'
        type: array
      spread_details:
        type: string
      symptoms:
        items:
          $ref: '#/definitions/internal_disease.InfoSection'
        type: array
      treatment:
        items:
          $ref: '#/definitions/internal_disease.InfoSection'
        type: array
      updated_at:
        type: string
    type: object
  internal_disease.InfoSection:
    properties:
      description:
        type: string
      title:
        type: string
    type: object
  internal_notification.Notification:
    properties:
      body:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_read:
        type: boolean
      reference_id:
        type: string
      title:
        type: string
      type:
        description: e.g., "OUTBREAK_NEARBY"
        type: string
      user_id:
        type: string
    type: object
  internal_notification.NotificationSettings:
    properties:
      enabled:
        type: boolean
      latitude:
        type: number
      longitude:
        type: number
      notify_nearby:
        type: boolean
      radius_km:
        type: number
      user_id:
        type: string
    type: object
  internal_notification.UpdateSettingsRequest:
    properties:
      enabled:
        type: boolean
      latitude:
        type: number
      longitude:
        type: number
      notify_nearby:
        type: boolean
      radius_km:
        type: number
    type: object
  internal_outbreak.OutbreakResponse:
    properties:
      created_at:
        type: string
      disease_id:
        type: string
      disease_name:
        type: string
      distance:
        type: number
      id:
        type: string
      image_url:
        type: string
      is_active:
        type: boolean
      is_verified:
        type: boolean
      latitude:
        type: number
      longitude:
        type: number
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Backend API for RiceSafe Application
  title: RiceSafe API
  version: "1.0"
paths:
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Change the password for the currently logged-in user
      parameters:
      - description: Change Password Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_auth.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/fiber.Map'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/fiber.Map'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/fiber.Map'
      security:
      - BearerAuth: []
      summary: Change user password
      tags:
      - Auth
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Request a password reset code via email
      parameters:
      - description: Forgot Password Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_auth.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/fiber.Map'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/fiber.Map'
      summary: Request password reset
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login with email and password
      parameters:
      - description: Login Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.AuthResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/fiber.Map'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/fiber.Map'
      summary: Login user
      tags:
      - Auth
  /auth/me:
    get:
      description: Get the profile of the currently logged-in user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.User'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/fiber.Map'
      security:
      - BearerAuth: []
      summary: Get user profile
      tags:
      - Auth
    put:
      consumes:
      - multipart/form-data
      description: Update username and/or avatar.
      parameters:
      - description: New Username
        in: formData
        name: username
        type: string
      - description: New Avatar Image
        in: formData
        name: avatar
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.User'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update user profile
      tags:
      - Auth
  /auth/oauth:
    post:
      consumes:
      - application/json
      description: Verifies social id_token and returns JWT. Creates user if they
        don't exist.
      parameters:
      - description: OAuth payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_auth.OAuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.AuthResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login with Google or LINE
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register with username, email, password, and optional role
      parameters:
      - description: Register Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_auth.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/fiber.Map'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/fiber.Map'
      summary: Register a new user
      tags:
      - Auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Reset password using the code received via email
      parameters:
      - description: Reset Password Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_auth.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/fiber.Map'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/fiber.Map'
      summary: Reset password
      tags:
      - Auth
  /community/posts:
    get:
      description: Get list of posts with pagination
      parameters:
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_community.PostResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Get community feed
      tags:
      - Community
    post:
      consumes:
      - multipart/form-data
      description: Create a community post with optional image
      parameters:
      - description: Post Content
        in: formData
        name: content
        required: true
        type: string
      - description: Post Image
        in: formData
        name: image
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_community.Post'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a new post
      tags:
      - Community
  /community/posts/{id}:
    delete:
      description: Remove a community post for moderation purposes (ADMIN only)
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a community post
      tags:
      - Community
    get:
      description: Get a single post details
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_community.PostResponse'
      security:
      - BearerAuth: []
      summary: Get post details
      tags:
      - Community
  /community/posts/{id}/comments:
    post:
      description: Add a comment to a post
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: string
      - description: Content
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_community.CreateCommentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_community.Comment'
      security:
      - BearerAuth: []
      summary: Add a comment
      tags:
      - Community
  /community/posts/{id}/like:
    post:
      description: Toggle like status for a post
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
      security:
      - BearerAuth: []
      summary: Like/Unlike a post
      tags:
      - Community
  /dashboard/weather:
    get:
      description: Get real-time weather data for a given location using OpenWeatherMap
      parameters:
      - description: Latitude
        in: query
        name: lat
        required: true
        type: number
      - description: Longitude
        in: query
        name: long
        required: true
        type: number
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_dashboard.WeatherResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get current weather
      tags:
      - Dashboard
  /diagnosis:
    post:
      consumes:
      - multipart/form-data
      description: Upload an image to get a disease prediction and details.
      parameters:
      - description: Rice Leaf Image
        in: formData
        name: image
        required: true
        type: file
      - description: Symptoms Description
        in: formData
        name: description
        type: string
      - description: Latitude (Optional, prevents outbreak if missing)
        in: formData
        name: latitude
        type: number
      - description: Longitude (Optional, prevents outbreak if missing)
        in: formData
        name: longitude
        type: number
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_diagnosis.DiagnosisResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Diagnose Disease from Image
      tags:
      - Diagnosis
  /diagnosis/history:
    get:
      description: Get a list of past diagnoses for the current user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_diagnosis.HistoryResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get Diagnosis History
      tags:
      - Diagnosis
  /diseases:
    get:
      description: Get a list of all diseases in the library
      parameters:
      - description: Filter by category
        in: query
        name: category
        type: string
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_disease.Disease'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List all diseases
      tags:
      - Diseases
    post:
      consumes:
      - application/json
      description: Create a new disease entry (EXPERT or ADMIN only)
      parameters:
      - description: Disease Data
        in: body
        name: disease
        required: true
        schema:
          $ref: '#/definitions/internal_disease.Disease'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_disease.Disease'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a new disease
      tags:
      - Diseases
  /diseases/{id}:
    get:
      description: Get full details of a specific disease
      parameters:
      - description: Disease ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_disease.Disease'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get disease details
      tags:
      - Diseases
    put:
      consumes:
      - application/json
      description: Update details of an existing disease (EXPERT or ADMIN only)
      parameters:
      - description: Disease ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated Data
        in: body
        name: disease
        required: true
        schema:
          $ref: '#/definitions/internal_disease.Disease'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_disease.Disease'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update disease details
      tags:
      - Diseases
  /diseases/categories:
    get:
      description: Get unique list of disease categories for key filtering
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List disease categories
      tags:
      - Diseases
  /notifications:
    get:
      consumes:
      - application/json
      description: Retrieves a paginated list of notifications for the authenticated
        user.
      parameters:
      - default: 20
        description: Limit
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_notification.Notification'
            type: array
      security:
      - BearerAuth: []
      summary: Get user notifications
      tags:
      - Notifications
  /notifications/{id}/read:
    put:
      consumes:
      - application/json
      description: Marks a specific notification as read.
      parameters:
      - description: Notification ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Mark notification as read
      tags:
      - Notifications
  /notifications/read-all:
    put:
      consumes:
      - application/json
      description: Marks all unread notifications for the user as read.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Mark all notifications as read
      tags:
      - Notifications
  /notifications/unread-count:
    get:
      consumes:
      - application/json
      description: Retrieves the total number of unread notifications.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: integer
            type: object
      security:
      - BearerAuth: []
      summary: Get unread notification count
      tags:
      - Notifications
  /outbreaks:
    get:
      description: Get outbreaks. For admins/experts, returns ALL outbreaks. For farmers,
        returns active outbreaks.
      parameters:
      - description: Filter only verified outbreaks (Farmer only)
        in: query
        name: verified
        type: boolean
      - description: User Latitude for distance
        in: query
        name: lat
