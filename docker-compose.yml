version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ricesafe_db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rice-safe-net

  # mock ai service for testing
  ai-service:
    build:
      context: ../mock-ai
      dockerfile: Dockerfile
    container_name: ricesafe_ai
    restart: unless-stopped
    ports:
      - ${AI_PORT:-8000}:8000
    networks:
      - rice-safe-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ricesafe_backend
    restart: unless-stopped
    ports:
      - "${PORT}:${PORT}"
    environment:
      - DB_SOURCE=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      - PORT=${PORT}
      - JWT_SECRET=${JWT_SECRET}
      - AI_SERVICE_URL=http://ai-service:8000
    volumes:
      - ./:/app
    depends_on:
      - db
    networks:
      - rice-safe-net

networks:
  rice-safe-net:
    driver: bridge

volumes:
  postgres_data:
