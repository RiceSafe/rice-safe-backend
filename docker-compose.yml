version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ricesafe_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ricesafe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rice-safe-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ricesafe_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DB_SOURCE=postgresql://postgres:postgres@db:5432/ricesafe?sslmode=disable
      - PORT=8080
    volumes:
      - ./:/app
    depends_on:
      - db
    networks:
      - rice-safe-net

networks:
  rice-safe-net:
    driver: bridge

volumes:
  postgres_data:
